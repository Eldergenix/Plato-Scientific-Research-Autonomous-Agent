[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short
filterwarnings =
    ignore:jsonschema.RefResolver is deprecated:DeprecationWarning:autogen.json_utils
    ignore:Accessing jsonschema.__version__ is deprecated:DeprecationWarning:autogen.import_utils
    ignore:Support for class-based `config` is deprecated:pydantic.warnings.PydanticDeprecatedSince20:autogen.agentchat.contrib.swarm_agent
    ignore:websockets.legacy is deprecated:DeprecationWarning:websockets.legacy
    ignore:websockets.server.WebSocketServerProtocol is deprecated:DeprecationWarning:uvicorn.protocols.websockets.websockets_impl
