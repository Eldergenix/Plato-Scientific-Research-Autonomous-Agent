name: security

# Four parallel security scanners. Each fails the workflow on its own
# severity bar — keep them independent so a single noisy scan does not
# block the rest of the signal.
#
# - bandit: static analysis of Plato's own Python (HIGH severity = block).
# - safety: known-CVE report against the resolved dep tree.
# - pip-audit: PyPA's own CVE check. This is the dependency hard gate.
# - gitleaks: secret-leak scan over the git history.
#
# Note on injection safety: this workflow does not consume any
# attacker-controlled fields (issue/PR titles, commit messages, body
# text). The only template substitution is ${{ secrets.GITHUB_TOKEN }},
# which is GitHub-issued and safe to interpolate.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly at 06:17 UTC. Catches CVEs disclosed after the last PR/push.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    name: bandit (static analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]"

      # Low+ severity report (informational). Excludes tests/ which by
      # design exercise the unsafe paths we want bandit to flag in plato/.
      - name: Bandit report (low+)
        run: |
          bandit -r plato/ evals/ -ll --exclude tests/ || true

      # Hard gate: any HIGH-severity finding fails the build. Anything
      # below HIGH is reported above but does not break CI.
      - name: Bandit hard gate (HIGH severity = fail)
        run: |
          bandit -r plato/ evals/ --severity-level high --exclude tests/

  safety:
    name: safety (CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      - name: Install Plato (with obs extras, fallback to base)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[obs]" || pip install -e .

      - name: Install safety
        run: |
          pip install safety

      # JSON report for the audit log. Always emits; never fails the job.
      # Safety's open database no longer exposes severity filtering to the
      # legacy check command, so pip-audit owns the hard gate below.
      - name: Safety report (advisory JSON)
        run: |
          safety check --policy-file .safety-policy.yml --save-json safety-report.json || true

      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json
          if-no-files-found: ignore

  pip-audit:
    name: pip-audit (PyPA CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pipaudit-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-pipaudit-

      - name: Install Plato (with obs extras, fallback to base)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[obs]" || pip install -e .

      - name: Install pip-audit
        run: |
          pip install pip-audit

      # Hard gate: any known vulnerability fails unless it is a reviewed
      # no-fix or blocked-upstream transitive finding. Editable first-party
      # packages are skipped because they are scanned by Bandit and Gitleaks.
      - name: pip-audit hard gate
        run: |
          pip-audit --skip-editable \
            --ignore-vuln CVE-2025-69872 \
            --ignore-vuln PYSEC-2026-76 \
            --ignore-vuln PYSEC-2026-83 \
            --ignore-vuln CVE-2026-27794 \
            --ignore-vuln CVE-2026-35029 \
            --ignore-vuln CVE-2026-35030 \
            --ignore-vuln GHSA-69x8-hrgq-fjj8 \
            --ignore-vuln CVE-2026-42271

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit, not just the
          # tip of the PR.
          fetch-depth: 0

      # Hard gate: any leak fails the workflow. The action exits non-zero
      # when findings are detected.
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
