name: eval-nightly

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"

jobs:
  run-evals:
    runs-on: ubuntu-latest
    env:
      # Cap nightly spend; the runner reads this via os.environ.
      PLATO_EVAL_MAX_USD: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Plato (with obs extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[obs]
          pip install pytest

      - name: Run eval harness
        run: |
          python -m evals.runner

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/
