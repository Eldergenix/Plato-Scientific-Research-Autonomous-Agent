name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Iter-8: matrix both supported Python versions. pyproject.toml
    # declares requires-python = ">=3.12,<3.14", so 3.13 is in-spec and
    # already runs in the production Dockerfiles. Linting only 3.12
    # missed typing regressions visible on 3.13.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pip-

      - name: Install Plato (with obs extras, fallback to base)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[obs]" || pip install -e .

      - name: Install lint tooling
        run: |
          pip install ruff mypy

      - name: Ruff check
        run: |
          ruff check plato/ evals/ tests/ --output-format=github

      - name: Ruff format check
        run: |
          ruff format --check plato/ evals/ tests/

      - name: Mypy (strict — new typed modules)
        # Modules that were typed from day one and are expected to stay
        # clean. Adding a module here is a one-way ratchet: don't soften
        # this list to make a build green, fix the types instead.
        run: |
          mypy --ignore-missing-imports --no-strict-optional --check-untyped-defs \
            plato/state \
            plato/retrieval \
            plato/tools \
            plato/io \
            plato/safety \
            plato/novelty \
            plato/loop \
            plato/domain \
            plato/observability.py

      - name: Mypy (loose — legacy modules)
        # Pre-Phase-1 code is not yet fully typed. Reported but does not
        # fail the build. As legacy modules get typed, *move* them to the
        # strict job above (don't keep them in both lists).
        continue-on-error: true
        run: |
          mypy --ignore-missing-imports --no-strict-optional --check-untyped-defs \
            plato/langgraph_agents \
            plato/paper_agents \
            plato/plato.py \
            plato/idea.py \
            plato/method.py \
            plato/experiment.py \
            plato/research.py \
            plato/key_manager.py \
            plato/llm.py \
            plato/utils.py

      - name: Import-graph cycle check
        run: |
          python .github/scripts/check_import_cycles.py --root plato
